name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate seed cases
        run: python -m mavis_eval validate cases/examples
      - name: Run unit tests
        run: python -m unittest
